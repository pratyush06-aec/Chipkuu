<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
  <title>Clipboard Workspace</title>
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo">📋</div>
      <div class="header-text">
        <h1>Clipboard Workspace</h1>
        <p class="subtitle">Auto-capture is <span id="status-text" class="status-on">active</span></p>
      </div>
    </div>

    <!-- Toggle -->
    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-label">Auto-Capture</span>
        <span class="toggle-desc">Capture copies automatically</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-capture" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Status Message -->
    <div id="status" class="status hidden"></div>

    <!-- Save Page Button -->
    <button id="save-link" class="save-btn">
      <span class="btn-icon">🔗</span>
      Save Current Page
    </button>

    <!-- Divider -->
    <div class="divider">
      <span>Recent Captures</span>
    </div>

    <!-- Recent Captures -->
    <div id="recent-captures" class="recent-list">
      <div class="recent-empty">No captures yet</div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span id="item-count" class="item-count">—</span> items saved
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
